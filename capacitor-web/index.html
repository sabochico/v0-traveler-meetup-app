<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="refresh" content="0; url=https://driftapp.me" />
    <title>Drift</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b0d12;
        color: #ffffff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at top, rgba(37, 99, 255, 0.28), transparent 34rem),
          linear-gradient(135deg, #0b0d12, #1a1f29);
        text-align: center;
      }

      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 20px;
        border-radius: 22px;
        background: linear-gradient(135deg, #2563ff, #00d4cc);
        box-shadow: 0 18px 50px rgba(37, 99, 255, 0.35);
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
      }

      p {
        margin: 12px auto 0;
        max-width: 280px;
        color: #aab2c0;
        font-size: 16px;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        margin-top: 28px;
        padding: 0 22px;
        border-radius: 999px;
        background: linear-gradient(90deg, #2563ff, #00d4cc);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
    <script>
      window.location.replace("https://driftapp.me")
    </script>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true"></div>
      <h1>Opening Drift</h1>
      <p>If Drift does not open automatically, check your connection and try again.</p>
      <a href="https://driftapp.me">Open Drift</a>
    </main>
  </body>
</html>
